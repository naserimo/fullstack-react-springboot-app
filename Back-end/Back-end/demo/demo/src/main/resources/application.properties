spring.application.name=SkillUp

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/myproject2024
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=8080

spring.jpa.hibernate.ddl-auto=update

# Enable Thymeleaf
spring.thymeleaf.enabled=false



# Thymeleaf template location
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Disable Thymeleaf caching (useful during development)
spring.thymeleaf.cache=false
server.servlet.session.cookie.secure=false





spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Connection Pool Configuration
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
server.servlet.session.cookie.same-site=lax

server.servlet.session.timeout=30m


# Optional: Spring Security Config (Remove if not using Spring Security)
# If you aren't using Spring Security, you can safely remove these lines
spring.security.enabled=false
# Remove this line if you're not using Spring Security
# spring.security.user.name=admin
# spring.security.user.password=admin

# Logging for security debugging (optional)
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.csrf=DEBUG

